name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Check Formatting
        run: cargo fmt --all -- --check

      - name: Clippy Lints
        run: cargo clippy --all-targets -- -D warnings

      - name: Install PDFium on macOS
        if: runner.os == 'macOS'
        run: |
          set -euo pipefail
          CACHE_DIR="$HOME/Library/Caches/pdf2md"
          mkdir -p "$CACHE_DIR"
          cd "$CACHE_DIR"
          # Download the universal macOS build for chromium/7690
          curl -L -o pdfium-mac-univ.tgz "https://github.com/bblanchon/pdfium-binaries/releases/download/chromium/7690/pdfium-mac-univ.tgz"
          tar -xzf pdfium-mac-univ.tgz
          # Ensure extracted directory is named pdfium-7690 (the tests look for this path)
          if [ ! -d "$CACHE_DIR/pdfium-7690" ]; then
            EXTRACTED_DIR=$(find . -maxdepth 1 -type d -name "pdfium*" | sed -n '1p' | sed 's|^./||')
            if [ -n "$EXTRACTED_DIR" ] && [ "$EXTRACTED_DIR" != "." ]; then
              mv "$EXTRACTED_DIR" pdfium-7690
            fi
          fi
          ls -la "$CACHE_DIR/pdfium-7690"

      - name: Run Tests
        run: cargo test --all-targets
