name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    name: Create Draft Release
    runs-on: ubuntu-latest
    steps:
      - name: Create Draft Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true

  upload-assets:
    name: Build & Upload (${{ matrix.target }})
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux Targets
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            suffix: x86_64-linux-gnu
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            suffix: x86_64-linux-musl
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            suffix: aarch64-linux-gnu
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            suffix: aarch64-linux-musl

          # macOS Targets
          - target: x86_64-apple-darwin
            os: macos-latest
            suffix: x86_64-macos
          - target: aarch64-apple-darwin
            os: macos-latest
            suffix: aarch64-macos

          # Windows Targets
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            suffix: x86_64-windows
          - target: i686-pc-windows-msvc
            os: windows-latest
            suffix: i386-windows
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            suffix: aarch64-windows

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Upload Rust Binary to Release
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: martini
          target: ${{ matrix.target }}
          archive: martini-$tag-${{ matrix.suffix }}
          include: README.md,LICENSE
          token: ${{ secrets.GITHUB_TOKEN }}
